# nginx proxy address - http://172.17.0.1:8096

name: ohmyform
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  ohmyform:
    image: ohmyform/ohmyform:latest
    pull_policy: always
    container_name: ohmyform-app
    restart: always
    logging: *default-logging
    networks:
      - ohmyform
    ports:
      - "172.17.0.1:8096:3000"
    environment:
      TZ: ${TZ:-America/New_York}
      MONGO_URI: mongodb://${DB_ADMIN_USER:-root}:${DB_ADMIN_PASS:-changeme_admin_password}@ohmyform-db:27017/${DB_CREATE_DATABASE_NAME:-ohmyform}
      SECRET: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      CREATE_ADMIN: "TRUE"
      ADMIN_EMAIL: ${APP_ADMIN_USER:-admin}@${BASE_DOMAIN_NAME:-example.com}
      ADMIN_PASSWORD: ${APP_ADMIN_PASS:-changeme_admin_password}
    volumes:
      - ./volumes/data/ohmyform:/data
      - ./volumes/config/ohmyform:/config
    depends_on:
      - ohmyform-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  ohmyform-db:
    image: mongo:latest
    pull_policy: always
    container_name: ohmyform-db
    restart: always
    logging: *default-logging
    networks:
      - ohmyform
    environment:
      TZ: ${TZ:-America/New_York}
      MONGO_INITDB_DATABASE: ${DB_CREATE_DATABASE_NAME:-ohmyform}
      MONGO_INITDB_ROOT_USERNAME: ${DB_ADMIN_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
    volumes:
      - ./volumes/data/db/mongodb/ohmyform:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ohmyform:
    external: false
